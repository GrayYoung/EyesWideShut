<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>CUP 修改密码</title>
    <link rel="stylesheet" type="text/css" href="../../../../css/sub.css"/>
    <script type="text/javascript" src="../../../../js/jquery.js"></script>
    <script type="text/javascript" src="../../../../js/jquery-ui.custom.js"></script>
    <script type="text/javascript" src="../../../../js/jquery.selectbox.js"></script>
    <script type="text/javascript" src="../../../../js/sub.js"></script>
</head>

<body onresize="cpt();" id="cup">
    <div class="top">
        <ul>
            <li class="file"></li>
            <li class="duplicate"></li>
            <li class="print"></li>
            <li class="search"></li>
            <li class="line"></li>
            <li class="setting"></li>
            <li class="fullScreen"></li>
            <li class="save"></li>
            <li class="remove"></li>
            <li class="line"></li>
            <li class="fresh"></li>
            <li class="help"></li>
            <li class="info"></li>
        </ul>
    </div>

    <div class="top2"><span></span></div>

    
    <div class="dialog">
        <table class="table1">
            <tr>
                <th>用户登录识别码</th>
                <td class="inSearch">
                    <input type="text"  class="frontMark" />
	                <select name="Items" class="inSearch">
		                <option value="option1">option1</option>
		                <option value="option2">option2</option>
		                <option value="option3">option3</option>
		                <option value="option4">option4</option>	
	                </select>
                </td>
            </tr>
            <tr>
                <th>原密码</th>
                <td></td>
            </tr>
            <tr>
                <th>新密码</th>
                <td></td>
            </tr>
            <tr>
                <th>验证</th>
                <td>
                </td>
            </tr>
            <tr>
                <td colspan="2"><center><button class="unavailable">确定</button><button>取消</button></center></td>
            </tr>
        </table>
        <div class="shadow"></div>
    </div>
</body>
</html>
