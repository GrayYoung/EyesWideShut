<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>海讯银行系统</title>
    <link rel="stylesheet" type="text/css" href="css/main.css" />
    <script type="text/javascript" src="js/jquery.js"></script>
    <script type="text/javascript" src="js/jquery.mousewheel.js"></script>
    <script type="text/javascript" src="js/main.js"></script>
</head>

<body onresize="compatible();">
    <div class="top">
        <div class="logo"></div>
        <div class="user">
            <button class="userPicture"></button>
            你好！<span>欢迎使用本系统!</span>
        </div>
    </div>

    <div class="main login">
        <div>
            <span class="userName">用户名</span><span class="password">登录密码</span>
            <a class="forgetPassword">忘记密码?</a>
        </div>
        <div class="loginForm">
            <input type="text" class="userName" /><input type="password" class="password" /><input type="button" value="登录" class="button_login" />
        </div>
    </div>
    <div class="foot">
        <img src="images/coprright.jpg" />
    </div>
</body>
</html>
