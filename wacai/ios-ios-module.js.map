<app-operation-toolbar></app-operation-toolbar>
<app-breadcrumb></app-breadcrumb>

<app-two-cols-layout>
  <div class="d-flex flex-column h-100" appStartContent>
    <app-database-table
      [database]="database"
      [displayedColumns]="['centerNO', 'lossCenter']"
      [displayedHeads]="['章节代码', '章节名称']">
    </app-database-table>
  </div>

  <form class="w-100">
    <div class="mb-4">
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>章节代码</label>
          <div appFieldControl>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>章节名称</label>
          <div appFieldControl>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>章节扩展名</label>
          <div appFieldControl>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>章节名称3</label>
          <div appFieldControl>
          </div>
        </div>
      </div>
    </div>

    <app-monitoring-logs></app-monitoring-logs>
  </form>
</app-two-cols-layout>
