<app-operation-toolbar></app-operation-toolbar>
<app-breadcrumb></app-breadcrumb>

<app-two-cols-layout>
  <div class="d-flex flex-column h-100" appStartContent>
    <app-database-table
      [database]="database"
      [displayedColumns]="['lossCenter', 'manager', 'centerNO']"
      [displayedHeads]="['利润损失中心', '管', '利润中心号码']">
    </app-database-table>
  </div>

  <form class="w-100">
    <div class="mb-4">
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>利润中心号码</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="999990" />
            </mat-form-field>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>利润中心名称</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="默认利润损失中心" />
            </mat-form-field>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>章节代码</label>
          <div appFieldControl>
            <app-search-input showPrefix="true"></app-search-input>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>用户缩写</label>
          <div appFieldControl>
            <app-search-input showPrefix="true"></app-search-input>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>文件网址URL</label>
          <div appFieldControl>
            <mat-form-field appearance="outline" class="mr-2">
              <input type="text" matInput />
            </mat-form-field>
            <div class="mat-form-field mr-2">
              <mat-checkbox>账户级别编码</mat-checkbox>
            </div>
            <div class="mat-form-field">
              <mat-checkbox>活动</mat-checkbox>
            </div>
          </div>
        </div>
      </div>
    </div>

    <mat-tab-group color="primary">
      <mat-tab label="资金">
        <div appFieldRow>
          <div appFieldGroup>
            <label appFieldLabel>本国货币利润中心</label>
            <div appFieldControl>
              <app-search-input showPrefix="true"></app-search-input>
            </div>
          </div>
          <div appFieldGroup>
            <label appFieldLabel>外国货币利润中心</label>
            <div appFieldControl>
              <app-search-input showPrefix="true"></app-search-input>
            </div>
          </div>
        </div>
      </mat-tab>
    </mat-tab-group>

    <div class="mb-4"></div>
    <app-monitoring-logs></app-monitoring-logs>
  </form>
</app-two-cols-layout>
