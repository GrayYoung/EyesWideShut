<div class="btn-group" role="group" aria-label="First group">
  <button type="button" mat-button (click)="onClick($event, 'new')">
    <i class="icon icon-file" aria-hidden="true"></i>
  </button>
  <button type="button" mat-button (click)="onClick($event, 'duplicate')">
    <i class="icon icon-duplicate" aria-hidden="true"></i>
  </button>
  <button type="button" mat-button (click)="onClick($event, 'print')">
    <i class="icon icon-print" aria-hidden="true"></i>
  </button>
  <button type="button" mat-button (click)="onClick($event, 'search')">
    <i class="icon icon-search" aria-hidden="true"></i>
  </button>
</div>
<div class="btn-group" role="group" aria-label="Second group">
  <button type="button" mat-button (click)="onClick($event, 'configure')">
    <i class="icon icon-setting" aria-hidden="true"></i>
  </button>
  <button type="button" mat-button (click)="onClick($event, 'expand')">
    <i class="icon icon-fullScreen" aria-hidden="true"></i>
  </button>
  <button type="button" mat-button (click)="onClick($event, 'save')">
    <i class="icon icon-save" aria-hidden="true"></i>
  </button>
  <button type="button" mat-button (click)="onClick($event, 'delete')">
    <i class="icon icon-remove" aria-hidden="true"></i>
  </button>
</div>
<div class="btn-group" role="group" aria-label="Third group">
  <button type="button" mat-button (click)="onClick($event, 'refresh')">
    <i class="icon icon-fresh" aria-hidden="true"></i>
  </button>
  <button type="button" mat-button (click)="onClick($event, 'help')">
    <i class="icon icon-help" aria-hidden="true"></i>
  </button>
  <button type="button" mat-button (click)="onClick($event, 'info')">
    <i class="icon icon-info" aria-hidden="true"></i>
  </button>
</div>
