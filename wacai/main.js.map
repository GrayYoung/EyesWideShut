<header id="header" class="container-fluid">
  <nav class="row navbar navbar-expand-md">
    <a class="navbar-brand" href="#">
      <img src="assets/images/logo.png" alt="Bank Logo" />
    </a>
    <button class="navbar-toggler d-lg-none" type="button" data-toggle="collapse" data-target="#navbarsExampleDefault" aria-controls="navbarsExampleDefault" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarsExampleDefault">
      <span class="navbar-text" [ngSwitch]="signed">
        <i class="icon icon-user-lg" aria-hidden="true"></i>
        <span *ngSwitchCase="true">{{user.name}}</span>
        <span *ngSwitchDefault>
          你好！<span class="text-info">欢迎使用本系统!</span>
        </span>
      </span>
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" href="javascript:void(0);" (click)="logout()" *ngIf="signed">
            <i class="icon icon-power-off" aria-hidden="true"></i> 退出系统
          </a>
        </li>
      </ul>
    </div>
  </nav>
</header>
