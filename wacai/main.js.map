<mat-drawer-container class="w-100 h-100" autosize>
  <mat-drawer #drawer mode="side" opened>
    <ng-content select="[appStartContent]"></ng-content>
  </mat-drawer>

  <mat-drawer-content class="d-flex flex-row overflow-hidden">
    <button id="btnCollapseLeft" type="button" mat-button (click)="drawer.toggle()"
      [attr.aria-expanded]="drawer.opened" aria-controls="collapseDataTable">
      <i aria-hidden="true"></i>
    </button>
    <div class="d-flex flex-fill border-left border-white h-100 overflow-hidden position-relative">
      <div class="position-absolute w-100 h-100 overflow-auto">
        <ng-content></ng-content>
      </div>
    </div>
  </mat-drawer-content>
</mat-drawer-container>
