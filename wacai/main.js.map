<ol class="breadcrumb">
  <li class="breadcrumb-item" *ngFor="let breadcrumb of data; let isLast = last"
    [ngClass]="{active: isLast}" [aria.current]="isLast ? 'page' : ''" [ngSwitch]="isLast">
    <u *ngSwitchCase="true">{{breadcrumb?.title}}</u>
    <span *ngSwitchDefault>{{breadcrumb?.title}}</span>
  </li>
</ol>
