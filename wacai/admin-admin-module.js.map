<ul #container (scroll)="onScroll(container)">
  <li *ngFor="let item of items;" [ngSwitch]="!!item.children && item.children.length > 0" (mouseenter)="onMouseEnterItem($event, item)" (mouseleave)="onMouseLeaveItem($event, item)">
    <a *ngSwitchCase="false" [routerLink]="getRouterLink(item)" routerLinkActive="active" class="text-underline" (click)="onMouseLeave()">
      <i [class]="item.icon" aria-hidden="true" *ngIf="item.icon"></i>
      {{item.title}}
    </a>
    <a *ngSwitchDefault href="javascript:void(0)">
      <i [class]="item.icon" aria-hidden="true" *ngIf="item.icon"></i>
      {{item.title}}
      <span class="arrow"></span>
    </a>
    <p *ngIf="item.description"><span>{{item.description}}</span></p>
  </li>
</ul>
