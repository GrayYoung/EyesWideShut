<app-management-header></app-management-header>
<mat-sidenav-container class="w-100 h-100" hasBackdrop="false">
  <mat-sidenav #leftSide mode="side" opened>
    <app-navigation-menu class="top-level" [items]="menuItems"></app-navigation-menu>
  </mat-sidenav>

  <mat-sidenav #rightSide mode="over" position="end" autoFocus="false">
    <router-outlet
      name="secondary"
      (activate)="onSecondaryOutletActivate($event)"
      (deactivate)="onSecondaryOutletDeactivate($event)"
    >
    </router-outlet>
  </mat-sidenav>

  <div class="d-flex w-100 h-100 overflow-hidden container-content">
    <router-outlet></router-outlet>
  </div>
</mat-sidenav-container>
<app-management-footer></app-management-footer>
