<app-operation-toolbar></app-operation-toolbar>
<app-breadcrumb></app-breadcrumb>

<app-two-cols-layout>
  <div class="d-flex flex-column h-100" appStartContent>
    <app-database-table
      [database]="database"
      [displayedColumns]="['groupCategory']"
      [displayedHeads]="['公共交易代码']">
    </app-database-table>
  </div>

  <form class="w-100">
    <div class="mb-4">
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>公共交易代码</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="1234" />
            </mat-form-field>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>公共贸易</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="名称RAN TEST" />
            </mat-form-field>
          </div>
        </div>
      </div>
    </div>

    <app-monitoring-logs></app-monitoring-logs>
  </form>
</app-two-cols-layout>
