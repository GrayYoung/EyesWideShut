<app-operation-toolbar></app-operation-toolbar>
<app-breadcrumb></app-breadcrumb>

<app-two-cols-layout>
  <div class="d-flex flex-column h-100" appStartContent>
    <app-database-table
      [database]="database"
      [displayedColumns]="['bilCode', 'level', 'counterparty']"
      [displayedHeads]="['BIL识别码', '等级', '交易对方']">
    </app-database-table>
  </div>

  <form class="w-100">
    <div class="mb-4">
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>产品解决系统</label>
          <div appFieldControl>
            <app-search-input showPrefix="true"></app-search-input>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>结算货币</label>
          <div appFieldControl>
            <app-search-input showPrefix="true"></app-search-input>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>合同发起人</label>
          <div appFieldControl>
            <app-input-nselect showPrefix="false" class="mr-2" style="width: 6rem;"></app-input-nselect>
            <app-input-nselect showPrefix="false" class="mr-2" style="width: 6rem;"></app-input-nselect>
            <app-search-input showPrefix="false" class="mr-2" style="width: 6rem;"></app-search-input>
            <mat-form-field appearance="outline" class="mr-2" style="width: 6rem;">
              <input type="text" matInput />
              <span matSuffix>
                <i class="icon icon-input-info"></i>
              </span>
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 6rem;">
              <input type="text" matInput />
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 2rem;">
              <input type="text" matInput />
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 2rem;">
              <input type="text" matInput />
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 2rem;">
              <input type="text" matInput />
            </mat-form-field>
            <div class="mat-form-field">
              <button mat-stroked-button class="btn-only-icon">
                <i class="icon icon-input-info"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>交易对方</label>
          <div appFieldControl>
            <app-input-nselect showPrefix="false" class="mr-2" style="width: 6rem;"></app-input-nselect>
            <app-input-nselect showPrefix="false" class="mr-2" style="width: 6rem;"></app-input-nselect>
            <app-search-input showPrefix="false" class="mr-2" style="width: 6rem;"></app-search-input>
            <mat-form-field appearance="outline" class="mr-2" style="width: 6rem;">
              <input type="text" matInput />
              <span matSuffix>
                <i class="icon icon-input-info"></i>
              </span>
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 6rem;">
              <input type="text" matInput />
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 2rem;">
              <input type="text" matInput />
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 2rem;">
              <input type="text" matInput />
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 2rem;">
              <input type="text" matInput />
            </mat-form-field>
            <div class="mat-form-field">
              <button mat-stroked-button class="btn-only-icon">
                <i class="icon icon-input-info"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>汇款行</label>
          <div appFieldControl>
            <app-input-nselect showPrefix="false" class="mr-2"></app-input-nselect>
            <app-search-input showPrefix="false" class="mr-2"></app-search-input>
            <mat-form-field appearance="outline" class="mr-2">
              <input type="text" matInput />
              <span matSuffix>
                <i class="icon icon-input-info"></i>
              </span>
            </mat-form-field>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>支付生效</label>
          <div appFieldControl>
            <div class="mat-form-field">
              <mat-checkbox name="active" [(ngModel)]="active">&nbsp;</mat-checkbox>
            </div>
          </div>
        </div>
      </div>
    </div>

    <app-monitoring-logs></app-monitoring-logs>
  </form>
</app-two-cols-layout>
