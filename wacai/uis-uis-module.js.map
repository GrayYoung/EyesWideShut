<app-operation-toolbar></app-operation-toolbar>
<app-breadcrumb></app-breadcrumb>

<app-two-cols-layout>
  <div class="d-flex flex-column h-100" appStartContent>
    <app-database-table [database]="database"
      [displayedColumns]="['id', 'name', 'signInId', 'abbr']"
      [displayedHeads]="['用户名识别码', '用户名', '用户登录识别', '用户缩写']">
    </app-database-table>
  </div>

  <form class="w-100">
    <div class="mb-4">
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>用户识别码</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="89999" />
            </mat-form-field>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>最后登陆时间</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="2012-10-16 18:20" />
            </mat-form-field>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>登录识别</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="exp" />
            </mat-form-field>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>员工识别</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="2012-10-16 18:20" />
            </mat-form-field>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>用户名</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="Expert user" />
            </mat-form-field>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>用户缩写</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="Expert user" />
            </mat-form-field>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>用户密码</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="89999" />
            </mat-form-field>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>屏幕语言</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="gb" />
            </mat-form-field>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>生效日期</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input matInput [matDatepicker]="startDatePcker">
              <mat-datepicker-toggle matSuffix [for]="startDatePcker">
                <i class="icon icon-calendar ml-1" matDatepickerToggleIcon></i>
              </mat-datepicker-toggle>
              <mat-datepicker #startDatePcker></mat-datepicker>
            </mat-form-field>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>失效日期</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input matInput [matDatepicker]="endDatePcker">
              <mat-datepicker-toggle matSuffix [for]="endDatePcker">
                <i class="icon icon-calendar ml-1" matDatepickerToggleIcon></i>
              </mat-datepicker-toggle>
              <mat-datepicker #endDatePcker></mat-datepicker>
            </mat-form-field>
          </div>
        </div>
      </div>
    </div>

    <mat-tab-group color="primary">
      <mat-tab label="用户识别码">
        <div appFieldRow>
          <div appFieldGroup>
            <label appFieldLabel>安全代码</label>
            <div appFieldControl>
              <app-input-nselect showPrefix="true"></app-input-nselect>
            </div>
          </div>
          <div appFieldGroup>
            <label appFieldLabel>用户状态</label>
            <div appFieldControl>
              <app-input-nselect showPrefix="true"></app-input-nselect>
            </div>
          </div>
        </div>
        <div appFieldRow>
          <div appFieldGroup>
            <label appFieldLabel>用户类型</label>
            <div appFieldControl>
              <app-input-nselect showPrefix="true"></app-input-nselect>
            </div>
          </div>
          <div appFieldGroup>
            <label appFieldLabel>操作者类型</label>
            <div appFieldControl>
              <app-input-nselect showPrefix="true"></app-input-nselect>
            </div>
          </div>
        </div>
        <div appFieldRow>
          <div appFieldGroup>
            <label appFieldLabel>访问识别</label>
            <div appFieldControl>
              <app-input-nselect showPrefix="true"></app-input-nselect>
            </div>
          </div>
          <div appFieldGroup>
            <label appFieldLabel>生产级别</label>
            <div appFieldControl>
              <app-input-nselect showPrefix="true"></app-input-nselect>
            </div>
          </div>
        </div>
        <div appFieldRow>
          <div appFieldGroup>
            <label appFieldLabel>专业级别</label>
            <div appFieldControl>
              <app-input-nselect showPrefix="true"></app-input-nselect>
            </div>
          </div>
          <div appFieldGroup>
            <label appFieldLabel>文件管理系统级别</label>
            <div appFieldControl>
              <app-input-nselect showPrefix="true"></app-input-nselect>
            </div>
          </div>
        </div>
        <div appFieldRow>
          <div appFieldGroup>
            <label appFieldLabel>产品解决方案</label>
            <div appFieldControl>
              <app-search-input showPrefix="true"></app-search-input>
            </div>
          </div>
          <div appFieldGroup>
            <label appFieldLabel>文件网址URL</label>
            <div appFieldControl>
              <a href="192.168.1.6/user/admin.asp">192.168.1.6/user/admin.asp</a>
            </div>
          </div>
        </div>
      </mat-tab>
      <mat-tab label="办公室信息">
      </mat-tab>
      <mat-tab label="办公电话">
      </mat-tab>
      <mat-tab label="私人信息">
      </mat-tab>
      <mat-tab label="私人电话">
      </mat-tab>
    </mat-tab-group>
    <div class="mb-4"></div>
    <app-monitoring-logs></app-monitoring-logs>
  </form>
</app-two-cols-layout>
