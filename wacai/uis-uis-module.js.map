<app-operation-toolbar></app-operation-toolbar>
<app-breadcrumb></app-breadcrumb>

<div class="p-2">
  <div class="">
    <div appFieldRow>
      <div appFieldGroup>
        <label appFieldLabel>用户登录识别码</label>
        <div appFieldControl>
          <app-search-input showPrefix="true"></app-search-input>
        </div>
      </div>
    </div>
    <div appFieldRow>
      <div appFieldGroup>
        <label appFieldLabel>原密码</label>
        <div appFieldControl>
          <mat-form-field appearance="outline">
            <input type="password" matInput value="" />
          </mat-form-field>
        </div>
      </div>
    </div>
    <div appFieldRow>
      <div appFieldGroup>
        <label appFieldLabel>新密码</label>
        <div appFieldControl>
          <mat-form-field appearance="outline">
            <input type="password" matInput value="" />
          </mat-form-field>
        </div>
      </div>
    </div>
    <div appFieldRow>
      <div appFieldGroup>
        <label appFieldLabel>验证</label>
        <div appFieldControl>
          <mat-form-field appearance="outline">
            <input type="text" matInput value="" />
          </mat-form-field>
        </div>
      </div>
    </div>
    <div class="d-flex flex-wrap align-items-center justify-content-center p-2 container-btns">
      <button mat-flat-button color="primary">确定</button>
      <button class="ml-2" mat-flat-button color="primary">覆盖级别</button>
      <button class="ml-2" mat-flat-button color="accent">取消</button>
    </div>
  </div>
</div>
