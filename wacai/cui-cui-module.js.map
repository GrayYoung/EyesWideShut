
<app-operation-toolbar></app-operation-toolbar>
<app-breadcrumb></app-breadcrumb>

<app-two-cols-layout>
  <div class="d-flex flex-column h-100" appStartContent>
    <app-database-table
      [database]="database"
      [displayedColumns]="['code', 'searchName']"
      [displayedHeads]="['客户识别码', '搜索名称']">
    </app-database-table>
  </div>

  <form class="w-100">
    <div class="mb-4">
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>客户识别码</label>
          <div appFieldControl>
            <div class="mat-form-field">
              <span class="mr-2">1000775</span>
              <mat-checkbox name="active" [(ngModel)]="active">活动</mat-checkbox>
            </div>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel></label>
          <div appFieldControl>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>总称</label>
          <div appFieldControl>
            <mat-checkbox name="active" [(ngModel)]="active">&nbsp;</mat-checkbox>
            <app-input-nselect showPrefix="false" class="mr-2"></app-input-nselect>
            <app-search-input showPrefix="false" class="mr-2"></app-search-input>
            <mat-form-field appearance="outline" class="mr-2">
              <input type="text" matInput />
            </mat-form-field>
            <div class="mat-form-field">
              <button mat-stroked-button class="btn-only-icon">
                <i class="icon icon-input-info"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>位置</label>
          <div appFieldControl>
            <mat-form-field appearance="outline" class="mr-2" style="width: 6rem;">
              <input type="text" matInput />
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 4rem;">
              <input type="text" matInput />
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 4rem;">
              <input type="text" matInput />
            </mat-form-field>
            <div class="mat-form-field">
              <button mat-stroked-button class="btn-only-icon">
                <i class="icon icon-input-search"></i>
              </button>
            </div>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>搜索名称</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="rfk" />
            </mat-form-field>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>名称</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="RAIDDEISENKASSW" />
            </mat-form-field>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>其他名称</label>
          <div appFieldControl>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>信箱/街区</label>
          <div appFieldControl>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>邮局</label>
          <div appFieldControl>
            <mat-form-field appearance="outline" class="mr-2" style="width: 8rem;">
              <input type="text" matInput />
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 8rem;">
              <input type="text" matInput />
            </mat-form-field>
            <div class="mat-form-field">
              <button mat-stroked-button class="btn-only-icon">
                <i class="icon icon-input-search"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>国家</label>
          <div appFieldControl>
            <mat-form-field appearance="outline" class="mr-2" style="width: 8rem;">
              <input type="text" matInput />
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 8rem;">
              <input type="text" matInput />
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 8rem;">
              <input type="text" matInput />
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 8rem;">
              <input type="text" matInput />
            </mat-form-field>
            <div class="mat-form-field">
              <button mat-stroked-button class="btn-only-icon">
                <i class="icon icon-input-search"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <mat-tab-group color="primary">
      <mat-tab label="附加">
        <div appFieldRow>
          <div appFieldGroup>
            <label appFieldLabel>银行关联</label>
            <div appFieldControl>
              <app-input-nselect showPrefix="false" class="mr-2"></app-input-nselect>
              <app-search-input showPrefix="false" class="mr-2"></app-search-input>
              <mat-form-field appearance="outline" class="mr-2">
                <input type="text" matInput />
              </mat-form-field>
              <div class="mat-form-field">
                <button mat-stroked-button class="btn-only-icon">
                  <i class="icon icon-input-info"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
        <div appFieldRow>
          <div appFieldGroup>
            <label appFieldLabel>分支银行数据库</label>
            <div appFieldControl>
              <app-search-input showPrefix="true"></app-search-input>
            </div>
          </div>
          <div appFieldGroup>
            <label appFieldLabel>分支银行办事处数</label>
            <div appFieldControl>
            </div>
          </div>
        </div>
        <div appFieldRow>
          <div appFieldGroup>
            <label appFieldLabel>利润损失中心</label>
            <div appFieldControl>
              <app-search-input showPrefix="true"></app-search-input>
            </div>
          </div>
          <div appFieldGroup>
            <label appFieldLabel>负责人</label>
            <div appFieldControl>
              <app-search-input showPrefix="true"></app-search-input>
            </div>
          </div>
        </div>
        <div appFieldRow>
          <div appFieldGroup>
            <label appFieldLabel>区域</label>
            <div appFieldControl>
              <app-search-input showPrefix="true"></app-search-input>
            </div>
          </div>
          <div appFieldGroup>
            <label appFieldLabel></label>
            <div appFieldControl>
            </div>
          </div>
        </div>
      </mat-tab>
      <mat-tab label="注册地">
      </mat-tab>
      <mat-tab label="联系">
      </mat-tab>
      <mat-tab label="电话信息">
      </mat-tab>
      <mat-tab label="物理地址">
      </mat-tab>
      <mat-tab label="法律地址">
      </mat-tab>
      <mat-tab label="管理偿付">
      </mat-tab>
      <mat-tab label="统计信息">
      </mat-tab>
    </mat-tab-group>

    <div class="mb-4"></div>
    <app-monitoring-logs></app-monitoring-logs>
  </form>
</app-two-cols-layout>
