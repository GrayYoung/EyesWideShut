<app-operation-toolbar></app-operation-toolbar>
<app-breadcrumb></app-breadcrumb>

<app-two-cols-layout>
  <div class="d-flex flex-column h-100" appStartContent>
    <app-database-table
      [database]="database"
      [displayedColumns]="['code', 'archiveSystem', 'materialDescription']"
      [displayedHeads]="['', '用户档案系统', '搜索']">
    </app-database-table>
  </div>

  <form class="w-100">
    <div class="mb-4">
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>操作地点</label>
          <div appFieldControl>
            <app-input-nselect class="mr-2" style="width: 8rem;"></app-input-nselect>
            <app-search-input class="mr-2" style="width: 8rem;"></app-search-input>
            <mat-form-field appearance="outline" style="width: 8rem;">
              <input type="text" matInput />
              <span matSuffix>
                <i class="icon icon-input-info"></i>
              </span>
            </mat-form-field>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>产品解决方案</label>
          <div appFieldControl>
            <app-search-input showPrefix="true"></app-search-input>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>用户档案系统</label>
          <div appFieldControl>
            <app-search-input showPrefix="true"></app-search-input>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>文件网址URL</label>
          <div appFieldControl>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>生效日期</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input matInput [matDatepicker]="startDatePcker">
              <mat-datepicker-toggle matSuffix [for]="startDatePcker">
                <i class="icon icon-calendar ml-1" matDatepickerToggleIcon></i>
              </mat-datepicker-toggle>
              <mat-datepicker #startDatePcker></mat-datepicker>
            </mat-form-field>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>失效日期</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input matInput [matDatepicker]="endDatePcker">
              <mat-datepicker-toggle matSuffix [for]="endDatePcker">
                <i class="icon icon-calendar ml-1" matDatepickerToggleIcon></i>
              </mat-datepicker-toggle>
              <mat-datepicker #endDatePcker></mat-datepicker>
            </mat-form-field>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel></label>
          <div appFieldControl>
          </div>
        </div>
      </div>
    </div>
    <app-monitoring-logs></app-monitoring-logs>
  </form>
</app-two-cols-layout>
