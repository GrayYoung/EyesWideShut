<app-operation-toolbar></app-operation-toolbar>
<app-breadcrumb></app-breadcrumb>

<app-two-cols-layout>
  <div class="d-flex flex-column h-100" appStartContent>
    <app-database-table
      [database]="database"
      [displayedColumns]="['code', 'archiveSystem', 'materialDescription', 'transferType']"
      [displayedHeads]="['', '对', '用', '查']">
    </app-database-table>
  </div>

  <form class="w-100">
    <div class="mb-4">
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>登录识别</label>
          <div appFieldControl>
            <app-search-input showPrefix="true"></app-search-input>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>产品解决系统</label>
          <div appFieldControl>
            <app-search-input showPrefix="true"></app-search-input>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>对象解决方案设计</label>
          <div appFieldControl>
            <app-search-input showPrefix="true"></app-search-input>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>用户档案系统</label>
          <div appFieldControl>
            <app-search-input showPrefix="true"></app-search-input>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>生效日期</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input matInput [matDatepicker]="startDatePcker">
              <mat-datepicker-toggle matSuffix [for]="startDatePcker">
                <i class="icon icon-calendar ml-1" matDatepickerToggleIcon></i>
              </mat-datepicker-toggle>
              <mat-datepicker #startDatePcker></mat-datepicker>
            </mat-form-field>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>失效日期</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input matInput [matDatepicker]="endDatePcker">
              <mat-datepicker-toggle matSuffix [for]="endDatePcker">
                <i class="icon icon-calendar ml-1" matDatepickerToggleIcon></i>
              </mat-datepicker-toggle>
              <mat-datepicker #endDatePcker></mat-datepicker>
            </mat-form-field>
          </div>
        </div>
      </div>
    </div>

    <mat-tab-group color="primary">
      <mat-tab label="用户信息">
        <div appFieldRow>
          <div appFieldGroup>
            <label appFieldLabel>操作地点</label>
            <div appFieldControl>
              <app-input-nselect class="mr-2" style="width: 8rem;"></app-input-nselect>
              <app-search-input class="mr-2" style="width: 8rem;"></app-search-input>
              <mat-form-field appearance="outline" class="mr-2">
                <input type="text" matInput />
              </mat-form-field>
              <div class="mat-form-field">
                <button mat-stroked-button class="btn-only-icon">
                  <i class="icon icon-input-info"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
        <div appFieldRow>
          <div appFieldGroup>
            <label appFieldLabel>屏幕语言</label>
            <div appFieldControl>
              <app-input-nselect showPrefix="true"></app-input-nselect>
            </div>
          </div>
          <div appFieldGroup>
            <label appFieldLabel></label>
            <div appFieldControl>
            </div>
          </div>
        </div>
      </mat-tab>
      <mat-tab label="访问代码">
      </mat-tab>
      <mat-tab label="限额">
      </mat-tab>
      <mat-tab label="会计项">
      </mat-tab>
    </mat-tab-group>

    <div class="mb-4"></div>
    <app-monitoring-logs></app-monitoring-logs>
  </form>
</app-two-cols-layout>
