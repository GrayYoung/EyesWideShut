<app-operation-toolbar></app-operation-toolbar>
<app-breadcrumb></app-breadcrumb>

<app-two-cols-layout>
  <div class="d-flex flex-column h-100" appStartContent>
    <app-database-table
      [database]="database"
      [displayedColumns]="['code', 'archiveSystem', 'materialDescription', 'transferType']"
      [displayedHeads]="['', '对', '用', '转']">
    </app-database-table>
  </div>

  <form class="w-100">
    <div class="mb-4">
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>应用程序</label>
          <div appFieldControl>
            <app-search-input showPrefix="true"></app-search-input>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>对象解决方案设计</label>
          <div appFieldControl>
            <app-search-input showPrefix="true"></app-search-input>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>用户档案系统</label>
          <div appFieldControl>
            <app-search-input showPrefix="true"></app-search-input>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>业务交易定额系统</label>
          <div appFieldControl>
            <app-input-nselect showPrefix="true"></app-input-nselect>
          </div>
        </div>
      </div>
    </div>

    <mat-tab-group color="primary">
      <mat-tab label="批准">
        <div appFieldRow>
          <div appFieldGroup>
            <label appFieldLabel>单笔额度级别</label>
            <div appFieldControl>
            </div>
          </div>
          <div appFieldGroup>
            <label appFieldLabel>双审核金额级别</label>
            <div appFieldControl>
            </div>
          </div>
        </div>
        <div class="mb-3"></div>
        <div appFieldRow>
          <div appFieldGroup>
            <label appFieldLabel>生效日期</label>
            <div appFieldControl>
              <mat-form-field appearance="outline">
                <input matInput [matDatepicker]="startDatePcker">
                <mat-datepicker-toggle matSuffix [for]="startDatePcker">
                  <i class="icon icon-calendar ml-1" matDatepickerToggleIcon></i>
                </mat-datepicker-toggle>
                <mat-datepicker #startDatePcker></mat-datepicker>
              </mat-form-field>
            </div>
          </div>
          <div appFieldGroup>
            <label appFieldLabel>失效日期</label>
            <div appFieldControl>
              <mat-form-field appearance="outline">
                <input matInput [matDatepicker]="endDatePcker">
                <mat-datepicker-toggle matSuffix [for]="endDatePcker">
                  <i class="icon icon-calendar ml-1" matDatepickerToggleIcon></i>
                </mat-datepicker-toggle>
                <mat-datepicker #endDatePcker></mat-datepicker>
              </mat-form-field>
            </div>
          </div>
        </div>
      </mat-tab>
    </mat-tab-group>

    <div class="mb-4"></div>
    <app-monitoring-logs></app-monitoring-logs>
  </form>
</app-two-cols-layout>
