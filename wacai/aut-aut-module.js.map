<app-operation-toolbar></app-operation-toolbar>
<app-breadcrumb></app-breadcrumb>

<app-two-cols-layout>
  <div class="d-flex flex-column h-100" appStartContent>
    <app-database-table
      [database]="database"
      [displayedColumns]="['archiveSystem', 'materialDescription']"
      [displayedHeads]="['用户档案系统', '用户资料描述']">
    </app-database-table>
  </div>

  <form class="w-100">
    <div class="mb-4">
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>用户档案系统</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="std1" />
            </mat-form-field>
          </div>
        </div>
        <div appFieldGroup>
            <label appFieldLabel>英文用户文档描述</label>
            <div appFieldControl>
              <mat-form-field appearance="outline">
                <input type="text" matInput readonly value="标准档案1" />
              </mat-form-field>
            </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>屏幕语言</label>
          <div appFieldControl>
            <app-input-nselect showPrefix="true"></app-input-nselect>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>用户资料描述</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="标准档案1" />
            </mat-form-field>
          </div>
        </div>
      </div>
    </div>
    <app-monitoring-logs></app-monitoring-logs>
  </form>
</app-two-cols-layout>
