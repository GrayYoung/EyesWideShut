<mat-form-field appearance="outline">
  <span *ngIf="showPrefix" matPrefix>
    <input class="value-label" readonly [value]="selectedValue?.value" />
  </span>
  <input type="text" matInput [formControl]="searchCtrl" [matAutocomplete]="auto">
  <span matSuffix>
    <i class="icon icon-input-search"></i>
  </span>
  <mat-autocomplete autoActiveFirstOption #auto="matAutocomplete" [displayWith]="getLabel" (optionSelected)="onOptionSelected($event)">
    <mat-option *ngFor="let item of filteredOptions | async" [value]="item" [disabled]="item.disabled">
      <ng-template [ngTemplateOutlet]="optionTemplate" [ngTemplateOutletContext]="{ option: item }"></ng-template>
    </mat-option>
  </mat-autocomplete>
</mat-form-field>

<ng-template #defaultOptionTemplate let-option="option">
  {{option.label}}
</ng-template>
