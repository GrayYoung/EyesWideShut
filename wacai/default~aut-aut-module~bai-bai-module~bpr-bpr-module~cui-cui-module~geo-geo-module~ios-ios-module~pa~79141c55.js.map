<div #flexFillContainer class="flex-fill overflow-auto">
  <table class="table table-sm table-bordered table-striped table-hover w-100 table-narrow" mat-table [dataSource]="data" matSort>
    <ng-container *ngFor="let colName of displayedColumns; let index = index" [matColumnDef]="colName">
      <th mat-header-cell *matHeaderCellDef>{{displayedHeads[index]}}</th>
      <td mat-cell *matCellDef="let row">{{row[colName]}}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="onClickRow($event, row)"></tr>
  </table>
</div>
<mat-paginator [length]="resultsLength" showFirstLastButtons></mat-paginator>
