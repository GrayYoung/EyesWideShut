<mat-form-field appearance="outline">
  <span *ngIf="showPrefix" matPrefix>
    <input class="value-label" readonly [value]="selectedValue?.value" />
  </span>
  <mat-select [(value)]="selectedValue">
    <mat-select-trigger>{{selectedValue?.label || 'Select'}}</mat-select-trigger>
    <mat-option *ngFor="let item of options" [value]="item">{{item.label}}</mat-option>
  </mat-select>
</mat-form-field>
