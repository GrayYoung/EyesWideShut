<app-management-header></app-management-header>
<main id="container-login" role="main" class="d-flex flex-grow-1 align-items-center justify-content-center container-fluid">
  <form class="w-100 d-flex flex-wrap align-items-center justify-content-center pt-4" (ngSubmit)="login()">
    <div class="container-field mr-md-5 mb-4">
      <mat-form-field appearance="outline">
        <i class="icon icon-user" aria-hidden="true" matPrefix></i>
        <mat-label>用户名</mat-label>
        <input name="account" type="text" required
          matInput [(ngModel)]="agent.account" />
      </mat-form-field>
      <div class="mt-3">
        <span>&nbsp;</span>
      </div>
    </div>

    <div class="container-field mr-md-5 mb-4">
      <mat-form-field appearance="outline">
        <i class="icon icon-lock" aria-hidden="true" matPrefix></i>
        <mat-label>登录密码</mat-label>
        <input name="password" type="password" required
          matInput [(ngModel)]="agent.password" />
      </mat-form-field>
      <div class="mt-3">
        <a href="javascript:void(0);" class="mt-2">忘记密码?</a>
      </div>
    </div>

    <div class="container-field mr-md-5 mb-4">
      <button type="submit" class="btn-primary" mat-flat-button [disabled]="requesting">登录</button>
      <div class="mt-3">
        <span>&nbsp;</span>
      </div>
    </div>
  </form>
</main>
<app-management-footer></app-management-footer>
