<app-operation-toolbar></app-operation-toolbar>
<app-breadcrumb></app-breadcrumb>

<app-two-cols-layout>
  <div class="d-flex flex-column h-100" appStartContent>
    <app-database-table
      [database]="database"
      [displayedColumns]="['sendSwift', 'receiveSwift', 'service', 'rmaType']"
      [displayedHeads]="['发证方SWIFT', '收证方SWIFT', 'S服务', 'RMA类型']">
    </app-database-table>
  </div>

  <form class="w-100">
    <div class="mb-4">
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>开证方SWIFT地址</label>
          <div appFieldControl>
            <mat-form-field appearance="outline" class="mr-2" style="width: 6rem;">
              <input type="text" matInput />
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 6rem;">
              <input type="text" matInput />
            </mat-form-field>
            <div class="mat-form-field">
              <button mat-stroked-button class="btn-only-icon">
                <i class="icon icon-input-search"></i>
              </button>
            </div>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>收证方SWIFT地址</label>
          <div appFieldControl>
            <mat-form-field appearance="outline" class="mr-2" style="width: 6rem;">
              <input type="text" matInput />
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 6rem;">
              <input type="text" matInput />
            </mat-form-field>
            <div class="mat-form-field">
              <button mat-stroked-button class="btn-only-icon">
                <i class="icon icon-input-search"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>SWIFT服务</label>
          <div appFieldControl>
            <app-input-nselect showPrefix="false"></app-input-nselect>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>RMA类型</label>
          <div appFieldControl>
            <app-input-nselect showPrefix="false"></app-input-nselect>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>RMA状态</label>
          <div appFieldControl>
            <app-input-nselect showPrefix="false"></app-input-nselect>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>发起时间纪录</label>
          <div appFieldControl>
            <mat-form-field appearance="outline" class="mr-2">
              <input matInput [matDatepicker]="launchDatePcker">
              <mat-datepicker-toggle matSuffix [for]="launchDatePcker">
                <i class="icon icon-calendar ml-1" matDatepickerToggleIcon></i>
              </mat-datepicker-toggle>
              <mat-datepicker #launchDatePcker></mat-datepicker>
            </mat-form-field>
            <mat-form-field appearance="outline">
              <input matInput [matDatepicker]="launchTimePcker">
              <mat-datepicker-toggle matSuffix [for]="launchTimePcker">
                <i class="icon icon-clock ml-1" matDatepickerToggleIcon></i>
              </mat-datepicker-toggle>
              <mat-datepicker #launchTimePcker></mat-datepicker>
            </mat-form-field>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>生效日期</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input matInput [matDatepicker]="startDatePcker">
              <mat-datepicker-toggle matSuffix [for]="startDatePcker">
                <i class="icon icon-calendar ml-1" matDatepickerToggleIcon></i>
              </mat-datepicker-toggle>
              <mat-datepicker #startDatePcker></mat-datepicker>
            </mat-form-field>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>失效日期</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input matInput [matDatepicker]="endDatePcker">
              <mat-datepicker-toggle matSuffix [for]="endDatePcker">
                <i class="icon icon-calendar ml-1" matDatepickerToggleIcon></i>
              </mat-datepicker-toggle>
              <mat-datepicker #endDatePcker></mat-datepicker>
            </mat-form-field>
          </div>
        </div>
      </div>
    </div>

    <mat-tab-group color="primary">
      <mat-tab label="权限">
        <div appFieldRow style="height: 400px;">
          <app-database-table
            [database]="database"
            [displayedColumns]="['sendSwift', 'receiveSwift', 'service', 'rmaType', 'serialNO']"
            [displayedHeads]="['发证方SWIFT', '收证方SWIFT', 'S服务', 'RMA类型', '权限序列号']">
          </app-database-table>
        </div>
      </mat-tab>
    </mat-tab-group>

    <div class="mb-4"></div>
    <app-monitoring-logs></app-monitoring-logs>
  </form>
</app-two-cols-layout>
