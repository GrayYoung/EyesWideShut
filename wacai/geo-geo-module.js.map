<app-operation-toolbar></app-operation-toolbar>
<app-breadcrumb></app-breadcrumb>

<app-two-cols-layout>
  <div class="d-flex flex-column h-100" appStartContent>
    <app-database-table
      [database]="database"
      [displayedColumns]="['id', 'location']"
      [displayedHeads]="['邮局识别', '邮局位置']">
    </app-database-table>
  </div>

  <form class="w-100">
    <div class="mb-4">
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>位置</label>
          <div appFieldControl>
            <mat-form-field appearance="outline" class="mr-2" style="width: 6rem;">
              <input type="text" matInput />
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 4rem;">
              <input type="text" matInput />
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 4rem;">
              <input type="text" matInput />
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 4rem;">
              <input type="text" matInput />
            </mat-form-field>
            <div class="mat-form-field">
              <button mat-stroked-button class="btn-only-icon">
                <i class="icon icon-input-search"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>国家</label>
          <div appFieldControl>
            <mat-form-field appearance="outline" class="mr-2" style="width: 6rem;">
              <input type="text" matInput />
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 4rem;">
              <input type="text" matInput />
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 4rem;">
              <input type="text" matInput />
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 4rem;">
              <input type="text" matInput />
            </mat-form-field>
            <div class="mat-form-field">
              <button mat-stroked-button class="btn-only-icon">
                <i class="icon icon-input-search"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>邮局识别</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="S-10325" />
            </mat-form-field>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>邮局地址</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="S-10325 STOCHKHOLM" />
            </mat-form-field>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>电话区号</label>
          <div appFieldControl>
            <div class="mat-form-field">
              <app-search-input showPrefix="true" class="mr-2"></app-search-input>
              <div class="mat-form-field">
                <button mat-stroked-button class="btn-only-icon">
                  <i class="icon icon-input-info"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>文件网址URL</label>
          <div appFieldControl>
          </div>
        </div>
      </div>
    </div>

    <app-monitoring-logs></app-monitoring-logs>
  </form>
</app-two-cols-layout>
