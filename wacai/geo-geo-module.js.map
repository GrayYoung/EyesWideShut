<app-operation-toolbar></app-operation-toolbar>
<app-breadcrumb></app-breadcrumb>

<div class="p-2">
  <div appFieldRow>
    <div appFieldGroup>
      <label appFieldLabel>产品解决系统</label>
      <div appFieldControl>
        <app-search-input showPrefix="true"></app-search-input>
      </div>
    </div>
    <div appFieldGroup>
      <label appFieldLabel>对象方案设计</label>
      <div appFieldControl>
        <app-search-input showPrefix="true"></app-search-input>
      </div>
    </div>
  </div>
  <div appFieldRow>
    <div appFieldGroup>
      <label appFieldLabel>合同发起人</label>
      <div appFieldControl>
        <app-input-nselect showPrefix="false" class="mr-2"></app-input-nselect>
        <app-input-nselect showPrefix="false" class="mr-2"></app-input-nselect>
        <app-search-input showPrefix="false" class="mr-2"></app-search-input>
        <mat-form-field appearance="outline" class="mr-2">
          <input type="text" matInput />
        </mat-form-field>
        <div class="mat-form-field">
          <button mat-stroked-button class="btn-only-icon">
            <i class="icon icon-input-info"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
  <div appFieldRow>
    <div appFieldGroup>
      <label appFieldLabel>交易对方</label>
      <div appFieldControl>
        <app-input-nselect showPrefix="false" class="mr-2"></app-input-nselect>
        <mat-form-field appearance="outline" class="mr-2">
          <input type="text" matInput />
        </mat-form-field>
        <mat-form-field appearance="outline" class="mr-2">
          <input type="text" matInput />
        </mat-form-field>
        <mat-form-field appearance="outline" class="mr-2">
          <input type="text" matInput />
        </mat-form-field>
        <div class="mat-form-field">
          <button mat-stroked-button class="btn-only-icon">
            <i class="icon icon-input-search"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class="mb-4"></div>
</div>
<div class="p-2 flex-fill" style="min-height: 500px;">
  <div appFieldRow class="h-100">
    <app-database-table
      [database]="database"
      [displayedColumns]="['code', 'searchName', 'counterparty']"
      [displayedHeads]="['BIL识别码', '等级', '交易对方']">
    </app-database-table>
  </div>
  <div class="mb-4"></div>
</div>
