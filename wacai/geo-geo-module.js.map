<app-operation-toolbar></app-operation-toolbar>
<app-breadcrumb></app-breadcrumb>

<app-two-cols-layout>
  <div class="d-flex flex-column h-100" appStartContent>
    <app-database-table
      [database]="database"
      [displayedColumns]="['name', 'countryCode', 'codeCumber']"
      [displayedHeads]="['区域名称', '国家识别码', '区域号码']">
    </app-database-table>
  </div>

  <form class="w-100">
    <div class="mb-4">
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>国家识别码</label>
          <div appFieldControl>
            <mat-form-field appearance="outline" class="mr-2" style="width: 6rem;">
              <input type="text" matInput />
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 4rem;">
              <input type="text" matInput />
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 4rem;">
              <input type="text" matInput />
            </mat-form-field>
            <mat-form-field appearance="outline" class="mr-2" style="width: 4rem;">
              <input type="text" matInput />
            </mat-form-field>
            <div class="mat-form-field">
              <button mat-stroked-button class="btn-only-icon">
                <i class="icon icon-input-search"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>区域号码</label>
          <div appFieldControl>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>区域名称</label>
          <div appFieldControl>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>文件网址URL</label>
          <div appFieldControl>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel></label>
          <div appFieldControl>
          </div>
        </div>
      </div>
    </div>

    <app-monitoring-logs></app-monitoring-logs>
  </form>
</app-two-cols-layout>
