<app-operation-toolbar></app-operation-toolbar>
<app-breadcrumb></app-breadcrumb>

<app-two-cols-layout>
  <div class="d-flex flex-column h-100" appStartContent>
    <app-database-table
      [database]="database"
      [displayedColumns]="['bilCode', 'countryEglishName']"
      [displayedHeads]="['识别码', 'ISO国家英语名称']">
    </app-database-table>
  </div>

  <form class="w-100">
    <div class="mb-4">
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>国家识别码</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="654" />
            </mat-form-field>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>ISO国家英语名称</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="SAINT LHELENA" />
            </mat-form-field>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>本国货币</label>
          <div appFieldControl>
            <app-search-input showPrefix="true"></app-search-input>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>ISO国家代码</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="SH SHN" />
            </mat-form-field>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>ISO国家编号</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="654" />
            </mat-form-field>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>本国代码</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="654" />
            </mat-form-field>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>时区代码</label>
          <div appFieldControl>
            <app-input-nselect showPrefix="true"></app-input-nselect>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel></label>
          <div appFieldControl>
          </div>
        </div>
      </div>
    </div>

    <mat-tab-group color="primary">
      <mat-tab label="非工作日">
        <div appFieldRow>
          <div appFieldGroup>
            <label appFieldLabel>非工作日</label>
            <div appFieldControl>
              <div class="mat-form-field mr-3" *ngFor="let item of ['一', '二', '三', '四', '五', '六', '七']">
                <mat-checkbox name="active">周{{item}}</mat-checkbox>
              </div>
            </div>
          </div>
        </div>
        <div appFieldRow>
          <div appFieldGroup>
            <label appFieldLabel>营业时间</label>
            <div appFieldControl>
              <mat-form-field appearance="outline" class="mr-2">
                <input type="text" matInput value="800" />
              </mat-form-field>
              <mat-form-field appearance="outline">
                <input type="text" matInput value="1600" />
              </mat-form-field>
            </div>
          </div>
        </div>
      </mat-tab>
      <mat-tab label="电话信息">
      </mat-tab>
      <mat-tab label="管理赔偿">
      </mat-tab>
      <mat-tab label="统计信息">
      </mat-tab>
      <mat-tab label="国家名称">
      </mat-tab>
    </mat-tab-group>

    <div class="mb-4"></div>
    <app-monitoring-logs></app-monitoring-logs>
  </form>
</app-two-cols-layout>
