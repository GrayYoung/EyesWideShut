<app-operation-toolbar></app-operation-toolbar>
<app-breadcrumb></app-breadcrumb>

<app-two-cols-layout>
  <div class="d-flex flex-column h-100" appStartContent>
    <app-database-table
      [database]="database"
      [displayedColumns]="['name', 'id']"
      [displayedHeads]="['自治区名称', '自治区识别码']">
    </app-database-table>
  </div>

  <form class="w-100">
    <div class="mb-4">
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>自治区识别</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="123456" />
            </mat-form-field>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>自治区名称</label>
          <div appFieldControl>
            <div class="mat-form-field">
              <span class="mr-2">test ane</span>
              <mat-checkbox>活自治区低税收识别</mat-checkbox>
            </div>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>自治区税收级别代码</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="0" />
            </mat-form-field>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>文件网址URL</label>
          <div appFieldControl>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>自治区税务授权识别码</label>
          <div appFieldControl>
            <app-input-nselect showPrefix="false" class="mr-2"></app-input-nselect>
            <app-search-input showPrefix="false" class="mr-2"></app-search-input>
            <mat-form-field appearance="outline" class="mr-2">
              <input type="text" matInput />
            </mat-form-field>
            <div class="mat-form-field">
              <button mat-stroked-button class="btn-only-icon">
                <i class="icon icon-input-info"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>自治区法院法官识别码</label>
          <div appFieldControl>
            <app-input-nselect showPrefix="false" class="mr-2"></app-input-nselect>
            <app-search-input showPrefix="false" class="mr-2"></app-search-input>
            <mat-form-field appearance="outline" class="mr-2">
              <input type="text" matInput />
            </mat-form-field>
            <div class="mat-form-field">
              <button mat-stroked-button class="btn-only-icon">
                <i class="icon icon-input-info"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <app-monitoring-logs></app-monitoring-logs>
  </form>
</app-two-cols-layout>
