<app-breadcrumb></app-breadcrumb>

<div class="d-flex flex-row">
  <mat-form-field appearance="fill">
    <mat-label>账本</mat-label>
    <mat-select
      name="book"
      [(value)]="selectedBook"
      (selectionChange)="onBookSelectionChange($event)"
    >
      <mat-option *ngFor="let option of books" [value]="option.id">
        {{ option.name }}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field class="flex-fill" appearance="fill">
    <mat-label>Enter a date range</mat-label>
    <mat-date-range-input [formGroup]="range" [rangePicker]="picker">
      <input
        matStartDate
        formControlName="start"
        placeholder="Start date"
      />
      <input matEndDate formControlName="end" placeholder="End date" />
    </mat-date-range-input>
    <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
    <mat-date-range-picker #picker></mat-date-range-picker>
  </mat-form-field>
</div>

<div class="container-fluid flex-fill py-2 overflow-auto">
  <div class="row h-50">
    <div class="col-12 col-lg-6">
      <app-sunburst-chart [data]="payCategoriesData"></app-sunburst-chart>
    </div>
    <div class="col-12 col-lg-6">
      <app-sunburst-chart [data]="revenueCategoriesData"></app-sunburst-chart>
    </div>
  </div>
  <div class="row h-50">
    <div class="col-12">
      <app-bar-chart [data]="revNExpndData"></app-bar-chart>
    </div>
  </div>
</div>
