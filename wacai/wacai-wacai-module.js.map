<app-breadcrumb></app-breadcrumb>

<app-two-cols-layout>
  <div class="d-flex flex-column h-100" appStartContent>
    <div #flexFillContainer class="flex-fill overflow-auto">
      <table class="table table-hover w-100" mat-table [dataSource]="secondaryDataSource">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>名称</th>
          <td mat-cell *matCellDef="let row">{{row.name}}</td>
        </ng-container>
        <ng-container matColumnDef="groupName">
          <th mat-header-cell *matHeaderCellDef>类型</th>
          <td mat-cell *matCellDef="let row">{{row.groupName}}</td>
        </ng-container>
        <ng-container matColumnDef="balanceMoney">
          <th mat-header-cell *matHeaderCellDef>余额/欠款</th>
          <td mat-cell *matCellDef="let row">{{row.moneyType.flag}} {{row.balanceMoney | number:'0.2-2'}}</td>
        </ng-container>
        <ng-container matColumnDef="tailNo">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let row">
            <button type="button" mat-icon-button color="primary" (click)="goToEntryList(row)">
              <mat-icon>receipt</mat-icon>
            </button>
          </td>
        </ng-container>
    
        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
    <mat-paginator showFirstLastButtons></mat-paginator>
  </div>

  <table class="table table-hover w-100" mat-table [dataSource]="dataSource" matSort>
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>名称</th>
      <td mat-cell *matCellDef="let row">{{row.name}}</td>
    </ng-container>
    <ng-container matColumnDef="groupName">
      <th mat-header-cell *matHeaderCellDef>类型</th>
      <td mat-cell *matCellDef="let row">{{row.groupName}}</td>
    </ng-container>
    <ng-container matColumnDef="balanceMoney">
      <th mat-header-cell *matHeaderCellDef>余额/欠款</th>
      <td mat-cell *matCellDef="let row">{{row.moneyType.flag}} {{row.balanceMoney | number:'0.2-2'}}</td>
    </ng-container>
    <ng-container matColumnDef="tailNo">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let row">
        <button type="button" mat-icon-button color="primary" *ngIf="!!row.uuid"y (click)="goToEntryList(row)">
          <mat-icon>receipt</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;" [class.group-row]="!row.name"></tr>
  </table>
</app-two-cols-layout>
