<app-operation-toolbar></app-operation-toolbar>
<app-breadcrumb></app-breadcrumb>

<app-two-cols-layout>
  <div class="d-flex flex-column h-100" appStartContent>
    <app-database-table
      [database]="database"
      [displayedColumns]="['code', 'lang']"
      [displayedHeads]="['参码', '语言']">
    </app-database-table>
  </div>

  <form class="w-100">
    <div class="mb-4">
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>佣金、收费及利息种类</label>
          <div appFieldControl>
            <app-search-input></app-search-input>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>英文文本描述</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="利息" />
            </mat-form-field>
          </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>语言代码</label>
          <div appFieldControl>
            <app-input-nselect showPrefix="true"></app-input-nselect>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>佣金、手续费及利息</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="N/A" />
            </mat-form-field>
          </div>
        </div>
      </div>
    </div>
    <app-monitoring-logs></app-monitoring-logs>
  </form>
</app-two-cols-layout>
