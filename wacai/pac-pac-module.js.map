<app-operation-toolbar></app-operation-toolbar>
<app-breadcrumb></app-breadcrumb>

<app-two-cols-layout>
  <div class="d-flex flex-column h-100" appStartContent>
    <app-database-table
      [database]="database"
      [displayedColumns]="['code', 'lang']"
      [displayedHeads]="['参数和代码', '屏幕语言']">
    </app-database-table>
  </div>

  <form class="w-100">
    <div class="mb-4">
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>国际贸易术语代码</label>
          <div appFieldControl>
            <app-search-input showPrefix="true"></app-search-input>
          </div>
        </div>
        <div appFieldGroup>
            <label appFieldLabel>英文文本描述</label>
            <div appFieldControl>
              <mat-form-field appearance="outline">
                <input type="text" matInput readonly value="利息" />
              </mat-form-field>
            </div>
        </div>
      </div>
      <div appFieldRow>
        <div appFieldGroup>
          <label appFieldLabel>语言代码</label>
          <div appFieldControl>
            <app-input-nselect showPrefix="true"></app-input-nselect>
          </div>
        </div>
        <div appFieldGroup>
          <label appFieldLabel>国际贸易术语名称</label>
          <div appFieldControl>
            <mat-form-field appearance="outline">
              <input type="text" matInput readonly value="" />
            </mat-form-field>
          </div>
        </div>
      </div>
    </div>
    <app-monitoring-logs></app-monitoring-logs>
  </form>
</app-two-cols-layout>
